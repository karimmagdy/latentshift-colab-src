# LatentShift on Split-MNIST (primary experiment)
method: latent_shift
benchmark: split_mnist
benchmark_args:
  batch_size: 64
  classes_per_task: 2

encoder: mlp
input_dim: 784
hidden_dim: 400
latent_dim: 256

# LatentShift-specific
threshold: 0.99
num_samples: 300
lossy: false

# Training
epochs: 10
lr: 0.01
