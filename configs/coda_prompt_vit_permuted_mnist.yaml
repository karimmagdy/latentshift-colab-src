# CODA-Prompt on Permuted-MNIST with ViT-Tiny
method: coda_prompt
benchmark: permuted_mnist
benchmark_args:
  batch_size: 64

encoder: vit_tiny
latent_dim: 256
img_size: 28
patch_size: 4
in_channels: 1

# CODA-Prompt-specific
pool_size: 100
prompt_length: 8
ortho_weight: 0.5
freeze_encoder: true

# Training
epochs: 10
lr: 0.001
