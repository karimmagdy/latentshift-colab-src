# CODA-Prompt on Split-TinyImageNet with ViT-Tiny
method: coda_prompt
benchmark: split_tinyimagenet
benchmark_args:
  batch_size: 64
  classes_per_task: 20

encoder: vit_tiny
latent_dim: 256
img_size: 64
patch_size: 8
in_channels: 3

# CODA-Prompt-specific
pool_size: 100
prompt_length: 8
ortho_weight: 0.5
freeze_encoder: true

# Training
epochs: 20
lr: 0.001
