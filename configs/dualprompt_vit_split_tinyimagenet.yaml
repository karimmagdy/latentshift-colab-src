# DualPrompt on Split-TinyImageNet with ViT-Tiny
method: dualprompt
benchmark: split_tinyimagenet
benchmark_args:
  batch_size: 64
  classes_per_task: 20

encoder: vit_tiny
latent_dim: 256
img_size: 64
patch_size: 8
in_channels: 3

# DualPrompt-specific
g_prompt_length: 5
e_prompt_length: 20
e_pool_size: 10
top_k: 5
g_layers: 2
freeze_encoder: true

# Training
epochs: 20
lr: 0.001
