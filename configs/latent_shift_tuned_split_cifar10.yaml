# Tuned LatentShift on Split-CIFAR-10 (ablation-guided hyperparams)
method: latent_shift_tuned
benchmark: split_cifar10
benchmark_args:
  batch_size: 64
  classes_per_task: 2

encoder: resnet18
latent_dim: 1024

# Tuned LatentShift-specific
threshold: 0.999
num_samples: 500
lossy: false

# Training
epochs: 20
lr: 0.01
