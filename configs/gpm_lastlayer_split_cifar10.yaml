# GPM (last-layer only) on Split-CIFAR-10
# Ablation: restrict GPM to latent layer only (like LatentShift)
method: gpm_lastlayer
benchmark: split_cifar10
benchmark_args:
  batch_size: 64
  classes_per_task: 2

encoder: resnet18
latent_dim: 256

# GPM-specific
threshold: 0.99
num_samples: 300

# Training
epochs: 20
lr: 0.01
