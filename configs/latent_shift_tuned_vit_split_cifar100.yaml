# Tuned LatentShift with ViT-Tiny on Split-CIFAR-100
method: latent_shift_tuned
benchmark: split_cifar100
benchmark_args:
  batch_size: 64
  classes_per_task: 10

encoder: vit_tiny
latent_dim: 1024
img_size: 32
patch_size: 4
in_channels: 3

# Tuned LatentShift-specific
threshold: 0.999
num_samples: 500
lossy: false

# Training
epochs: 20
lr: 0.001
