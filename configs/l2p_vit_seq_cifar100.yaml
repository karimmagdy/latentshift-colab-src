# L2P on Seq-CIFAR-100 (50 tasks) with ViT-Tiny
method: l2p
benchmark: seq_cifar100
benchmark_args:
  batch_size: 64

encoder: vit_tiny
latent_dim: 256
img_size: 32
patch_size: 4
in_channels: 3

# L2P-specific
pool_size: 10
prompt_length: 5
top_k: 5
freeze_encoder: true
pull_weight: 0.5

# Training
epochs: 20
lr: 0.001
