# Tuned LatentShift on Permuted-MNIST (ablation-guided hyperparams)
method: latent_shift_tuned
benchmark: permuted_mnist
benchmark_args:
  batch_size: 64
  num_tasks: 10

encoder: mlp
input_dim: 784
hidden_dim: 400
latent_dim: 1024

# Tuned LatentShift-specific
threshold: 0.999
num_samples: 500
lossy: false

# Training
epochs: 10
lr: 0.01
