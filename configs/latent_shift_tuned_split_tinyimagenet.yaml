# Tuned LatentShift on Split-TinyImageNet (ablation-guided hyperparams)
method: latent_shift_tuned
benchmark: split_tinyimagenet
benchmark_args:
  batch_size: 64
  classes_per_task: 20

encoder: resnet18
small_input: false
latent_dim: 1024

# Tuned LatentShift-specific
threshold: 0.999
num_samples: 500
lossy: false

# Training
epochs: 20
lr: 0.01
