# LatentShift on Permuted-MNIST (domain-incremental)
method: latent_shift
benchmark: permuted_mnist
benchmark_args:
  batch_size: 64
  num_tasks: 10

encoder: mlp
input_dim: 784
hidden_dim: 400
latent_dim: 256

# LatentShift-specific
threshold: 0.99
num_samples: 300
lossy: false

# Training
epochs: 10
lr: 0.01
